<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kong Logo Downloader</title>
<link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300;400;700;800&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000F06;
    --surface: #0A1A0E;
    --surface-2: #0F1F12;
    --border: #1B3020;
    --border-hover: #2C4A2E;
    --text-primary: #FFFFFF;
    --text-secondary: #858983;
    --accent: #CCFF00;
    --logo-fill: #CCFF00;
    --preview-bg: #001408;
  }
  body.electric {
    --bg: #b8e600;
    --surface: #CCFF00;
    --surface-2: #d4ff1a;
    --border: #a8d400;
    --border-hover: #8ab000;
    --text-primary: #001408;
    --text-secondary: #2D4A1E;
    --accent: #001408;
    --logo-fill: #001408;
    --preview-bg: #CCFF00;
  }
  body.bay {
    --bg: #C4CAC2;
    --surface: #D8DDD6;
    --surface-2: #CDD3CB;
    --border: #B0B6AE;
    --border-hover: #8C918A;
    --text-primary: #101110;
    --text-secondary: #4A4D49;
    --accent: #001408;
    --logo-fill: #CCFF00;
    --preview-bg: #A1A69F;
  }
  body.bw {
    --bg: #1A1A1A;
    --surface: #111111;
    --surface-2: #0D0D0D;
    --border: #2E2E2E;
    --border-hover: #444444;
    --text-primary: #FFFFFF;
    --text-secondary: #888888;
    --accent: #FFFFFF;
    --logo-fill: #FFFFFF;
    --preview-bg: #000000;
  }
  body.bw-inverted {
    --bg: #E8E8E8;
    --surface: #F5F5F5;
    --surface-2: #EFEFEF;
    --border: #D0D0D0;
    --border-hover: #AAAAAA;
    --text-primary: #111111;
    --text-secondary: #666666;
    --accent: #111111;
    --logo-fill: #000000;
    --preview-bg: #FFFFFF;
  }

  /* B/W invert toggle */
  .bw-invert-row { display: none; }
  body.bw .bw-invert-row,
  body.bw-inverted .bw-invert-row { display: block; }
  .bw-invert-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
    user-select: none;
    transition: border-color 0.2s;
  }
  .bw-invert-toggle:hover { border-color: var(--border-hover); }
  .bw-opt {
    flex: 1;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 5px 0;
    text-align: center;
    border-radius: 999px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .bw-opt.active { background: var(--accent); color: var(--bg); }

  body {
    font-family: 'Funnel Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.25s, color 0.25s;
  }

  .app {
    max-width: 1080px;
    margin: 0 auto;
    padding: 40px 32px 64px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .hd-sep { width: 1px; height: 18px; background: var(--border); }
  .hd-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); }

  /* Theme toggle */
  .theme-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
    user-select: none;
    transition: border-color 0.2s;
  }
  .theme-toggle:hover { border-color: var(--border-hover); }
  .t-opt {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 999px;
    color: var(--text-secondary);
    transition: all 0.2s;
    cursor: pointer;
  }
  .t-opt.active { background: var(--accent); color: var(--bg); }

  /* Layout */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    align-items: start;
  }

  /* Logo grid — flush, no gap, collapsed borders */
  .logo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .logo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-right: -1px;
    margin-bottom: -1px;
    position: relative;
    z-index: 0;
  }
  .logo-card:hover { border-color: var(--border-hover); z-index: 1; }
  .logo-card.selected {
    border-color: var(--accent);
    outline: 2px solid var(--accent);
    outline-offset: -2px;
    z-index: 2;
  }

  /* Preview area — square, no padding, logo centered */
  .preview-area {
    background: var(--preview-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    aspect-ratio: 1 / 1;
    border-bottom: 1px solid var(--border);
    transition: background 0.25s;
  }
  .preview-area svg { max-width: 100%; height: auto; display: block; }
  .preview-area svg .lp { fill: var(--logo-fill); transition: fill 0.25s; }

  .card-footer {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .variant-label { font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-secondary); }
  .check-dot {
    width: 17px; height: 17px;
    border-radius: 50%;
    background: var(--accent);
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-card.selected .check-dot { display: flex; }
  .check-dot svg { width: 9px; height: 9px; }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    position: sticky;
    top: 28px;
  }

  .section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 10px; }
  .size-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .inp-group { display: flex; flex-direction: column; gap: 5px; }
  .inp-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); }
  .px-input {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 7px 10px;
    font-family: 'Roboto Mono', monospace;
    font-size: 13px;
    color: var(--text-primary);
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .px-input::-webkit-outer-spin-button, .px-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .px-input:focus { border-color: var(--accent); }

  .lock-hint { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-secondary); margin-top: 6px; }
  .lock-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  /* BG toggle */
  .bg-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
    user-select: none;
  }
  .bg-opt {
    flex: 1;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 5px 0;
    text-align: center;
    border-radius: 999px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .bg-opt.active { background: var(--accent); color: var(--bg); }
  .bg-note { font-size: 10px; color: var(--text-secondary); margin-top: 7px; min-height: 14px; font-family: 'Roboto Mono', monospace; }

  /* Download buttons */
  .dl-list { display: flex; flex-direction: column; gap: 7px; }
  .dl-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 9px 15px;
    cursor: pointer;
    font-family: 'Funnel Sans', system-ui, sans-serif;
    font-size: 12px; font-weight: 700;
    color: var(--text-primary);
    transition: border-color 0.2s, color 0.2s;
  }
  .dl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .dl-btn:hover .dl-meta { color: var(--accent); }
  .dl-btn:hover .dl-fmt { color: var(--accent); }
  .dl-right { display: flex; align-items: center; gap: 6px; }
  .dl-fmt { font-family: 'Roboto Mono', monospace; font-size: 11px; font-weight: 700; color: var(--accent); transition: color 0.2s; }
  .dl-meta { font-family: 'Roboto Mono', monospace; font-size: 10px; color: var(--text-secondary); transition: color 0.2s; }
  .dl-icon { width: 13px; height: 13px; color: var(--accent); }

  .info-block { border-top: 1px solid var(--border); padding-top: 16px; }
  .info-name { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
  .info-dims { font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--text-secondary); }

  canvas#offscreen { display: none; }

  @media (max-width: 760px) {
    .main-grid { grid-template-columns: 1fr; }
    .panel { position: static; }
    .logo-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

        <div class="section-title">Output Size (px)</div>
        <div class="size-row">
          <div class="inp-group">
            <label class="inp-label" for="wInput">Width</label>
            <input type="number" class="px-input" id="wInput" value="800" min="8" max="8000">
          </div>
          <div class="inp-group">
            <label class="inp-label" for="hInput">Height</label>
            <input type="number" class="px-input" id="hInput" value="214" min="8" max="8000">
          </div>
        </div>
        <div class="lock-hint">
          <div class="lock-dot"></div>
          <span>Proportions locked · K clearspace included</span>
        </div>
      </div>

      <div class="bw-invert-row">
        <div class="section-title">Invert</div>
        <div class="bw-invert-toggle" id="bwInvertToggle">
          <span class="bw-opt active" data-bwinvert="black">Black BG</span>
          <span class="bw-opt" data-bwinvert="white">White BG</span>
        </div>
      </div>

      <div>
        <div class="section-title">Background</div>
        <div class="bg-toggle" id="bgToggle">
          <span class="bg-opt active" data-bg="yes">With BG</span>
          <span class="bg-opt" data-bg="no">No BG</span>
        </div>
        <div class="bg-note" id="bgNote"></div>
      </div>

      <div>
        <div class="section-title">Download</div>
        <div class="dl-list">
          <button class="dl-btn" id="dlSVG">
            <span>Vector</span>
            <div class="dl-right">
              <span class="dl-meta">Scalable</span>
              <span class="dl-fmt">SVG</span>
              <svg class="dl-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0l-3-3m3 3l3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </button>
          <button class="dl-btn" id="dlPNG">
            <span>Lossless</span>
            <div class="dl-right">
              <span class="dl-meta" id="pngMeta">With BG</span>
              <span class="dl-fmt">PNG</span>
              <svg class="dl-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0l-3-3m3 3l3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </button>
          <button class="dl-btn" id="dlJPG">
            <span>Compressed</span>
            <div class="dl-right">
              <span class="dl-meta" id="jpgMeta">With BG</span>
              <span class="dl-fmt">JPG</span>
              <svg class="dl-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0l-3-3m3 3l3-3M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </button>
        </div>
      </div>

      <div class="info-block">
        <div class="section-title">Selected</div>
        <div class="info-name" id="infoName">Emblem + Logotype</div>
        <div class="info-dims" id="infoDims">800 × 214 px · Dark</div>
      </div>
    </div>

  </div>
</div>

<script>
// K-height clearspace unit (measured from K glyph in source files)
const K = 73.7;

const VARIANTS = {
  symbol_logotype:         { name: 'Emblem + Logotype',       vw: 429, vh: 137 },
  symbol_logotype_tagline: { name: 'Emblem + Logo + Tagline', vw: 426, vh: 211 },
  symbol:                  { name: 'Emblem Only',             vw: 153, vh: 137, square: true },
  logotype:                { name: 'Logotype Only',           vw: 250, vh:  94 },
};

// Padded (with clearspace) dimensions used for export and aspect ratio
// Emblem is square: use max(vw,vh) as the canvas side
function pvw(v) { return (v.square ? Math.max(v.vw, v.vh) : v.vw) + K * 2; }
function pvh(v) { return (v.square ? Math.max(v.vw, v.vh) : v.vh) + K * 2; }
function pratio(v) { return pvw(v) / pvh(v); }

// Translate offsets: center logo within the padded canvas
function tx(v) { return K; }
function ty(v) { return v.square ? K + (Math.max(v.vw, v.vh) - v.vh) / 2 : K; }

let theme = 'dark';
let bwInverted = false;
let variant = 'symbol_logotype';
let ratio = pratio(VARIANTS['symbol_logotype']); // 576.4/284.4 ≈ 2.026
let withBg = true;

// Cache path data from the translate groups inside preview SVGs
const PATH_CACHE = {};
document.querySelectorAll('.logo-card').forEach(card => {
  const v = card.dataset.variant;
  const g = card.querySelector('svg g');
  PATH_CACHE[v] = g.innerHTML.replace(/\sclass="lp"/g, '');
});

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', e => {
  const opt = e.target.closest('.t-opt');
  if (!opt || opt.dataset.t === theme) return;
  theme = opt.dataset.t;
  // Reset bw invert when leaving bw theme
  if (theme !== 'bw') {
    bwInverted = false;
    document.querySelectorAll('.bw-opt').forEach(o => o.classList.toggle('active', o.dataset.bwinvert === 'black'));
  }
  document.querySelectorAll('.t-opt').forEach(o => o.classList.toggle('active', o.dataset.t === theme));
  document.body.className = theme === 'dark' ? '' : (theme === 'bw' && bwInverted ? 'bw-inverted' : theme);
  updateInfo();
});

// B/W invert toggle
document.getElementById('bwInvertToggle').addEventListener('click', e => {
  const opt = e.target.closest('.bw-opt');
  if (!opt) return;
  bwInverted = opt.dataset.bwinvert === 'white';
  document.querySelectorAll('.bw-opt').forEach(o => o.classList.toggle('active', o.dataset.bwinvert === (bwInverted ? 'white' : 'black')));
  document.body.className = bwInverted ? 'bw-inverted' : 'bw';
  updateInfo();
});

// BG toggle
document.getElementById('bgToggle').addEventListener('click', e => {
  const opt = e.target.closest('.bg-opt');
  if (!opt) return;
  withBg = opt.dataset.bg === 'yes';
  document.querySelectorAll('.bg-opt').forEach(o => o.classList.toggle('active', o.dataset.bg === (withBg ? 'yes' : 'no')));
  updateInfo();
});

// Card selection
document.getElementById('cardGrid').addEventListener('click', e => {
  const card = e.target.closest('.logo-card');
  if (!card) return;
  document.querySelectorAll('.logo-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  variant = card.dataset.variant;
  ratio = pratio(VARIANTS[variant]);
  const w = parseInt(document.getElementById('wInput').value) || 800;
  document.getElementById('hInput').value = Math.round(w / ratio);
  updateInfo();
});

// Size inputs — proportional lock
document.getElementById('wInput').addEventListener('input', () => {
  const w = parseInt(document.getElementById('wInput').value) || 0;
  if (w > 0) document.getElementById('hInput').value = Math.round(w / ratio);
  updateInfo();
});
document.getElementById('hInput').addEventListener('input', () => {
  const h = parseInt(document.getElementById('hInput').value) || 0;
  if (h > 0) document.getElementById('wInput').value = Math.round(h * ratio);
  updateInfo();
});

function updateInfo() {
  const w = parseInt(document.getElementById('wInput').value) || 800;
  const h = parseInt(document.getElementById('hInput').value) || 214;
  const labels = { dark: 'Dark', electric: 'Electric', bay: 'Bay', bw: 'B/W' };
  const activeTheme = theme === 'bw' && bwInverted ? 'bw-inverted' : theme;
  const themeLabel = activeTheme === 'bw-inverted' ? 'B/W Inverted' : labels[theme];
  document.getElementById('infoName').textContent = VARIANTS[variant].name;
  document.getElementById('infoDims').textContent = `${w} \u00d7 ${h} px \u00b7 ${themeLabel}`;
  document.getElementById('pngMeta').textContent = withBg ? 'With BG' : 'Transparent';
  document.getElementById('jpgMeta').textContent = withBg ? 'With BG' : 'White BG';
  document.getElementById('bgNote').textContent = !withBg ? 'JPG will use white BG (no alpha)' : '';
}

const THEME_COLORS = {
  dark:         { fill: '#CCFF00', bg: '#001408' },
  electric:     { fill: '#001408', bg: '#CCFF00' },
  bay:          { fill: '#CCFF00', bg: '#A1A69F' },
  bw:           { fill: '#FFFFFF', bg: '#000000' },
  'bw-inverted':{ fill: '#000000', bg: '#FFFFFF' },
};
function colors() {
  const key = theme === 'bw' && bwInverted ? 'bw-inverted' : theme;
  return THEME_COLORS[key];
}

// Build export SVG: padded canvas + K clearspace, logo correctly offset
function buildSVG(w, h) {
  const v = VARIANTS[variant];
  const { fill, bg } = colors();
  const ew = pvw(v), eh = pvh(v);
  const bgRect = withBg ? `<rect width="${ew}" height="${eh}" fill="${bg}"/>` : '';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${ew} ${eh}">
  ${bgRect}
  <g fill="${fill}" transform="translate(${tx(v)},${ty(v)})">${PATH_CACHE[variant]}</g>
</svg>`;
}

// SVG download
document.getElementById('dlSVG').addEventListener('click', () => {
  const w = parseInt(document.getElementById('wInput').value) || 800;
  const h = parseInt(document.getElementById('hInput').value) || 214;
  const bgSuffix = withBg ? 'bg' : 'nobg';
  dl(URL.createObjectURL(new Blob([buildSVG(w, h)], { type: 'image/svg+xml' })),
     `kong-${variant}-${theme}-${bgSuffix}-${w}x${h}.svg`);
});

// Raster download
function rasterDownload(fmt) {
  const w = parseInt(document.getElementById('wInput').value) || 800;
  const h = parseInt(document.getElementById('hInput').value) || 214;
  const { bg } = colors();
  const canvas = document.getElementById('offscreen');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const url = URL.createObjectURL(new Blob([buildSVG(w, h)], { type: 'image/svg+xml;charset=utf-8' }));
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, w, h);
    if (fmt === 'jpg') { ctx.fillStyle = withBg ? bg : '#FFFFFF'; ctx.fillRect(0, 0, w, h); }
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    const bgSuffix = withBg ? 'bg' : 'nobg';
    const mime = fmt === 'jpg' ? 'image/jpeg' : 'image/png';
    canvas.toBlob(b => dl(URL.createObjectURL(b), `kong-${variant}-${theme}-${bgSuffix}-${w}x${h}.${fmt}`), mime, 0.95);
  };
  img.src = url;
}

document.getElementById('dlPNG').addEventListener('click', () => rasterDownload('png'));
document.getElementById('dlJPG').addEventListener('click', () => rasterDownload('jpg'));

function dl(href, name) {
  const a = document.createElement('a');
  a.href = href; a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(href), 1500);
}

updateInfo();
</script>
</body>
</html>
